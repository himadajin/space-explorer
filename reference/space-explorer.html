  // invisible generous hit areas so tiny points stay tappable
  let _hitMat = null;
  function hitMaterial(){
    if(!_hitMat) _hitMat = new THREE.SpriteMaterial({ opacity: 0, transparent: true, depthWrite: false });
    return _hitMat;
  }

  function buildSystemStage(d){
    const st = newStage();
    const pos = c => {
      const rng = SE.mulberry32(SE.chain(c.chain, 0x0913));
      const orbitR = 0.34 + Math.min(c.segIndex, 12) * 0.17 + rng() * 0.05;
      const ang = rng() * Math.PI * 2;
      return new THREE.Vector3(orbitR*Math.cos(ang), (rng()-0.5)*0.05*orbitR, orbitR*Math.sin(ang));
    };
    const off = anchorOffset(d.children, d.focusedAddrStr, pos);
    // the star: a point of unbearable brightness, not a disc —
    // its color is the same derivation the galaxy stage already shows
    const starC = starColorOf(d.desc.chain);
    const starCss = cssOf(starC);
    const starPos = new THREE.Vector3().copy(off).negate();
    const core = new THREE.Sprite(markerMaterial(starCss).clone());
    core.scale.setScalar(0.06);
    core.position.copy(starPos);
    const halo = glowSprite(starC, 0.5);
    halo.position.copy(starPos);
    const halo2 = glowSprite(starC, 1.7);
    halo2.material.opacity = 0.16;
    halo2.position.copy(starPos);
    st.group.add(core, halo, halo2);
    // planets: near-invisible points of light in the dark, like
    // evening stars — their disc belongs to the planet stage alone
    for(const c of d.children){
      const p = pos(c).sub(off);
      const sp = new THREE.Sprite(markerMaterial(desat(c.colorCss, 0.3)).clone());
      sp.scale.setScalar(0.013 + c.radius*0.005);
      sp.position.copy(p);
      st.group.add(sp);
      const hit = new THREE.Sprite(hitMaterial());
      hit.scale.setScalar(0.10);
      hit.position.copy(p);
      addPickable(st, 1, hit, c);
      st.group.add(hit);
      if(c.addrStr === d.focusedAddrStr) st.focusProxy = sp;
    }
    return st;
  }

  // interior stars of a galaxy, in its own local frame. The rng
  // stream is consumed in a fixed order, so asking for N points
  // yields exactly the first N of the full cloud: a distant galaxy
  // is literally a subset of the same stars, resolved sparsely
  function galaxyPointData(chainH, colorArr, N){
    const rngB = SE.mulberry32(SE.chain(chainH, 0xB061));
    const gauss = () => (rngB()+rngB()+rngB()+rngB()-2)/2;
    const tint = colorArr.map(c => c + (1-c)*0.55);
    const posA = new Float32Array(N*3), colA = new Float32Array(N*3);
    const cool = [0.78, 0.85, 1.0], warm = [1.0, 0.92, 0.78];
    for(let i = 0; i < N; i++){
      const u = rngB();
      let x, y, z, w, heat;
      if(u < 0.24){ // bulge
        const rr = Math.abs(gauss()) * 0.16;
        const th = rngB()*Math.PI*2, ph = Math.acos(2*rngB()-1);
        x = rr*Math.sin(ph)*Math.cos(th); z = rr*Math.sin(ph)*Math.sin(th);
        y = rr*Math.cos(ph)*0.7;
        w = 0.45 + rngB()*0.55; heat = 0.9;
      }else if(u < 0.54){ // thin faint disc
        const rr = Math.sqrt(rngB()) * 1.25;
        const th = rngB()*Math.PI*2;
        x = rr*Math.cos(th); z = rr*Math.sin(th);
        y = gauss() * 0.045 * (1.3 - rr*0.6);
        w = 0.10 + 0.30*Math.pow(rngB(), 2); heat = 0.35;
      }else{ // arms
        const t = Math.pow(rngB(), 0.75);
        const rr = 0.14 + t * 1.1;
        const arm = (i % 2) * Math.PI;
        const th = arm + Math.log(rr/0.12) * 2.4 + gauss() * (0.16 + 0.5*(1-t));
        const spread = 0.05 + 0.10*rr;
        x = rr*Math.cos(th) + gauss()*spread;
        z = rr*Math.sin(th) + gauss()*spread;
        y = gauss() * 0.04 * (1.3 - rr*0.5);
        w = 0.15 + 0.85*Math.pow(rngB(), 2.4); heat = rngB() < 0.15 ? 0.9 : 0.1;
      }
      posA[i*3] = x; posA[i*3+1] = y; posA[i*3+2] = z;
      for(let k = 0; k < 3; k++){
        const base = cool[k] + (warm[k]-cool[k]) * heat;
        colA[i*3+k] = (base*0.65 + tint[k]*0.35) * w;
      }
    }
    return { pos: posA, col: colA };
  }

  function buildGalaxyStage(d){
    const st = newStage();
    // the whole galaxy frame is tilted by the galaxy's own
    // orientation — the same one its exterior plane uses
    st.group.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), orientationOf(d.desc.chain));
    const pos = c => {
      const rng = SE.mulberry32(SE.chain(c.chain, 0x6a1a));
      const rr = Math.sqrt(rng()) * 1.2, ang = rng() * Math.PI * 2;
      return new THREE.Vector3(rr*Math.cos(ang), (rng()-0.5)*0.08, rr*Math.sin(ang));
    };
    const off = anchorOffset(d.children, d.focusedAddrStr, pos);
    const data = galaxyPointData(d.desc.chain, d.desc.params.color, Math.round(2600 * detail));
    for(let i = 0; i < data.pos.length; i += 3){
      data.pos[i] -= off.x; data.pos[i+1] -= off.y; data.pos[i+2] -= off.z;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.BufferAttribute(data.pos, 3));
    g.setAttribute("color", new THREE.BufferAttribute(data.col, 3));
    st.group.add(new THREE.Points(g, new THREE.PointsMaterial({ map: pointTexture(),
      size: 0.0065, sizeAttenuation: true, vertexColors: true,
      transparent: true, opacity: 0.9, depthWrite: false,
      blending: THREE.AdditiveBlending })));
    // still only: a dim spherical halo of old stars around the disc,
    // and small tight star-cluster grains strung along the arms.
    // Separate rng salt, so lower tiers keep their exact clouds.
    if(detail >= 8){
      const rngX = SE.mulberry32(SE.chain(d.desc.chain, 0xB062));
      const gX = () => (rngX()+rngX()+rngX()+rngX()-2)/2;
      const xPos = [], xCol = [];
      for(let i = 0; i < 1400; i++){ // halo
        const rr = 0.15 + Math.abs(gX()) * 0.8;
        const th = rngX()*Math.PI*2, ph = Math.acos(2*rngX()-1);
        xPos.push(rr*Math.sin(ph)*Math.cos(th) - off.x,
                  rr*Math.cos(ph)*0.8 - off.y,
                  rr*Math.sin(ph)*Math.sin(th) - off.z);
        const w = 0.04 + 0.10*Math.pow(rngX(), 2);
        xCol.push(w*0.85, w*0.9, w);
      }
      for(let c2 = 0; c2 < 26; c2++){ // star clusters on the arms
        const t = Math.pow(rngX(), 0.7);
        const rr = 0.2 + t * 1.0;
        const arm = rngX() < 0.5 ? 0 : Math.PI;
        const th = arm + Math.log(rr/0.12) * 2.4 + gX() * 0.15;
        const cx = rr*Math.cos(th), cz = rr*Math.sin(th);
        const cy = gX() * 0.03;
        const hot = rngX() < 0.5;
        for(let k = 0; k < 34; k++){
          xPos.push(cx + gX()*0.022 - off.x, cy + gX()*0.014 - off.y, cz + gX()*0.022 - off.z);
          const w = 0.25 + 0.6*Math.pow(rngX(), 2);
          if(hot) xCol.push(w*0.82, w*0.9, w);
          else    xCol.push(w, w*0.9, w*0.76);
        }
      }
      const gx = new THREE.BufferGeometry();
      gx.setAttribute("position", new THREE.BufferAttribute(new Float32Array(xPos), 3));
      gx.setAttribute("color", new THREE.BufferAttribute(new Float32Array(xCol), 3));
      st.group.add(new THREE.Points(gx, new THREE.PointsMaterial({ map: pointTexture(),
        size: 0.005, sizeAttenuation: true, vertexColors: true,
        transparent: true, opacity: 0.9, depthWrite: false,
        blending: THREE.AdditiveBlending })));
    }
    for(const c of d.children){
      // the point of light IS the star you will meet inside
      const sp = new THREE.Sprite(markerMaterial(cssOf(starColorOf(c.chain))).clone());
      sp.material.opacity = 0.8;
      sp.position.copy(pos(c).sub(off));
      sp.scale.setScalar(0.042);
      st.group.add(sp);
      const hit = new THREE.Sprite(hitMaterial());
      hit.scale.setScalar(0.09);
      hit.position.copy(sp.position);
      addPickable(st, 2, hit, c);
      st.group.add(hit);
      if(c.addrStr === d.focusedAddrStr) st.focusProxy = sp;
    }
    return st;
  }

  function buildClusterStage(d){
    const st = newStage();
    const pos = c => {
      const rng = SE.mulberry32(SE.chain(c.chain, 0xC1a5));
      const v = () => (rng()+rng()+rng())/1.5 - 1;
      return new THREE.Vector3(v()*0.9, v()*0.5, v()*0.9);
    };
    const off = anchorOffset(d.children, d.focusedAddrStr, pos);
    // every galaxy is drawn in the same language as the focused one:
    // a subset of its own stars (first N of the same rng stream),
    // merged into one geometry. The smudge plane stays underneath,
    // dimmed, as the unresolved light between the stars.
    const NMINI = Math.round(170 * Math.sqrt(detail));
    const mPos = [], mCol = [];
    const q = new THREE.Quaternion(), vv = new THREE.Vector3();
    const up = new THREE.Vector3(0,1,0);
    for(const c of d.children){
      const rng = SE.mulberry32(SE.chain(c.chain, 0xC1a6));
      const op = 0.35 + 0.65 * Math.pow(rng(), 2);
      const size = 0.20 + rng()*0.18;
      const p0 = pos(c).sub(off);
      const plane = galaxyPlane(desat(c.colorCss, 0.7), c.chain);
      plane.scale.setScalar(size);
      plane.material.opacity = op * 0.45;
      plane.position.copy(p0);
      st.group.add(plane);
      const hit = new THREE.Sprite(hitMaterial());
      hit.scale.setScalar(0.13);
      hit.position.copy(p0);
      addPickable(st, 3, hit, c);
      st.group.add(hit);
      if(c.addrStr === d.focusedAddrStr){
        st.focusProxy = plane;
        continue; // its stars live in the galaxy stage itself
      }
      // baked mini point cloud, oriented and scaled like its interior
      const data = galaxyPointData(c.chain, parseRgb(c.colorCss).map(x => x/255), NMINI);
      q.setFromUnitVectors(up, orientationOf(c.chain));
      const s = size / 2.6;
      const bright = 0.55 + 0.45 * op;
      for(let i = 0; i < NMINI; i++){
        vv.set(data.pos[i*3], data.pos[i*3+1], data.pos[i*3+2])
          .applyQuaternion(q).multiplyScalar(s).add(p0);
        mPos.push(vv.x, vv.y, vv.z);
        mCol.push(data.col[i*3]*bright, data.col[i*3+1]*bright, data.col[i*3+2]*bright);
      }
    }
    if(mPos.length){
      const g = new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(mPos), 3));
      g.setAttribute("color", new THREE.BufferAttribute(new Float32Array(mCol), 3));
      const mat = new THREE.PointsMaterial({ map: pointTexture(),
        size: 0.005, sizeAttenuation: true, vertexColors: true,
        transparent: true, opacity: 0.95, depthWrite: false,
        blending: THREE.AdditiveBlending });
      // scenery, not an entered medium: these clumps are distant
      // objects and must scale with their stage frame like any other
      // body, never dissolve under the aggregate rule
      mat.userData.scenery = true;
      st.group.add(new THREE.Points(g, mat));
    }
    return st;
  }

  function buildWebStage(d){
    const st = newStage();
    // the structure is carried entirely by dust density: matter
    // gathered on walls, filaments and nodes, dim in the voids —
    // no lines, no diagram
    if(d.dust && d.dust.pts.length){
      const n = d.dust.pts.length / 3;
      const pos = new Float32Array(d.dust.pts);
      const col = new Float32Array(n * 3);
      for(let i = 0; i < n; i++){
        const w = d.dust.w[i];
        const b = 0.08 + 0.92 * Math.pow(w, 1.6);
        col[i*3]   = b * (0.82 + 0.18 * w);
        col[i*3+1] = b * (0.86 + 0.10 * w);
        col[i*3+2] = b;
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      g.setAttribute("color", new THREE.BufferAttribute(col, 3));
      st.group.add(new THREE.Points(g, new THREE.PointsMaterial({ map: pointTexture(),
        size: 0.0075, sizeAttenuation: true, vertexColors: true,
        transparent: true, opacity: 0.9, depthWrite: false,
        blending: THREE.AdditiveBlending })));
      // gas layer: a sparse subset of structure points drawn large
      // and extremely faint — the thickness of the medium
      const gasMax = Math.round(700 * detail);
      const gPos = [], gCol = [];
      for(let i = 0, taken = 0; i < n && taken < gasMax; i++){
        if(d.dust.w[i] < 0.45 || i % 3 !== 0) continue;
        taken++;
        gPos.push(d.dust.pts[i*3], d.dust.pts[i*3+1], d.dust.pts[i*3+2]);
        const w = d.dust.w[i];
        gCol.push(0.75 + 0.25*w, 0.8 + 0.12*w, 0.92);
      }
      if(gPos.length){
        const gg = new THREE.BufferGeometry();
        gg.setAttribute("position", new THREE.BufferAttribute(new Float32Array(gPos), 3));
        gg.setAttribute("color", new THREE.BufferAttribute(new Float32Array(gCol), 3));
        st.group.add(new THREE.Points(gg, new THREE.PointsMaterial({ map: pointTexture(),
          size: 0.13, sizeAttenuation: true, vertexColors: true,
          transparent: true, opacity: 0.045, depthWrite: false,
          blending: THREE.AdditiveBlending })));
      }
    }
    // features at their true geometric positions
    for(const c of d.children){
      const sp = new THREE.Sprite(markerMaterial(WEB_COLOR[c.fkind]).clone());
      sp.material.opacity = WEB_ALPHA[c.fkind];
      sp.position.set(c.pos[0], c.pos[1], c.pos[2]);
      sp.scale.setScalar(WEB_SIZE[c.fkind]);
      addPickable(st, 4, sp, c);
      st.group.add(sp);
      if(c.addrStr === d.focusedAddrStr) st.focusProxy = sp;
    }
    return st;
  }

  const BUILDERS = [buildPlanetStage, buildSystemStage, buildGalaxyStage,
                    buildClusterStage, buildWebStage];

  function buildStages(data, z0){
    for(const st of stages) if(st){ scene.remove(st.group); disposeGroup(st.group); }
    stages = new Array(5).fill(null);
    pickables = [];
    let minStage = 4;
    for(let j = 0; j < 5; j++){
      if(!data[j]) continue;
      minStage = Math.min(minStage, j);
      const st = BUILDERS[j](data[j]);
      collectMats(st);
      scene.add(st.group);
      stages[j] = st;
    }
    zMin = minStage === 0 ? -0.25 : minStage - 0.25;
    // never above the medium: the dark beyond the dust must read
    // as the limit of sight, not the edge of the universe
    zMax = 4.05;
    setZ(z0, true);
    updateStageTransforms();
  }

  // Z -> per-stage scale and crossfade. The main scale owns the
  // frame; neighbouring scales are context and stay at a whisper.
  function stageFade(d){
    let f;
    if(d >= -0.25 && d <= 0.85) f = 1;
    else if(d > 0.85) f = Math.max(0, 1 - (d - 0.85) / 0.85);
    else f = Math.max(0, 1 + (d + 0.25) / 0.65);
    if(d > 0.6) f *= 0.55 + 0.45 * Math.max(0, 1 - (d - 0.6) / 0.4);
    return f;
  }
  function updateStageTransforms(){
    if(sky){
      const f = skyFade(Z);
      sky.group.visible = f > 0.004;
      if(sky.group.visible) for(const mm of sky.mats) mm.m.opacity = mm.base * f;
    }
    for(let j = 0; j < 5; j++){
      const st = stages[j];
      if(!st) continue;
      const dRel = j - Z;
      const s = Math.exp(LSUM[j] - logScaleAt(Z));
      const fade = stageFade(dRel);
      st.fade = fade;
      st.group.visible = fade > 0.004;
      if(!st.group.visible) continue;
      st.group.scale.setScalar(s);
      for(const mm of st.mats) mm.m.opacity = mm.base * fade;
      // aggregate point clouds are statistical smudges, not objects:
      // they never grow past their native size, and once the camera
      // moves inside them (s >> 1) they dissolve into darkness and
      // hand detail over to the finer stage
      const aggF = s <= 1.5 ? 1 : Math.max(0, 1 - Math.log(s / 1.5) / Math.log(20));
      for(const pm of st.pointMats){
        if(pm.scenery){
          // a distant object: scales with its frame, angular size
          // invariant, never dissolves
          pm.m.size = pm.base * s;
        }else{
          pm.m.size = pm.base * Math.min(s, 1);
          pm.m.opacity *= aggF;
        }
      }
      if(st.focusProxy){
        // true crossfade: the proxy's opacity is exactly the
        // complement of its detail stage's fade, so the focused
        // object never doubles and never pops — one representation
        // hands the light to the other
        const det = stages[j-1];
        const pv = det ? Math.max(0, Math.min(1, 1 - stageFade((j-1) - Z))) : 1;
        st.focusProxy.material.opacity *= pv;
        // apparent-size cap: while its stage frame is blown up by
        // the zoom, the proxy stays a small distant light instead of
        // a screen-filling glow; it returns to its native marker
        // size as its own scale arrives (s -> 1)
        const ud = st.focusProxy.userData;
        if(ud.baseScale === undefined) ud.baseScale = st.focusProxy.scale.x;
        st.focusProxy.scale.setScalar(Math.min(ud.baseScale, 0.26 / s));
      }
    }
  }

  /* --- camera & controls --- */
  const orbit = { theta: 0.6, phi: 1.25, dist: 3.6 };
  function applyCamera(){
    orbit.phi = Math.max(0.15, Math.min(Math.PI - 0.15, orbit.phi));
    const s = Math.sin(orbit.phi);
    camera.position.set(
      orbit.dist * s * Math.cos(orbit.theta),
      orbit.dist * Math.cos(orbit.phi),
      orbit.dist * s * Math.sin(orbit.theta));
    camera.lookAt(0, 0, 0);
  }
  applyCamera();

  const pointers = new Map();
  let pinchD0 = 0, pinchZ0 = 0;
  let tap = null;
  // rotation inertia: releasing a drag lets the sky keep turning,
  // slowing like a heavy globe
  let vTheta = 0, vPhi = 0, lastMoveT = 0;
  const raycaster = new THREE.Raycaster();
  const cnv = renderer.domElement;

  cnv.addEventListener("webglcontextlost", e => { e.preventDefault(); });
  cnv.addEventListener("webglcontextrestored", () => { if(onCtxRestored) onCtxRestored(); });

  function tryPick(x, y){
    if(!onPick || !pickables.length) return;
    const ndc = new THREE.Vector2(
      (x / window.innerWidth) * 2 - 1,
      -(y / window.innerHeight) * 2 + 1);
    raycaster.setFromCamera(ndc, camera);
    const visible = pickables.filter(o => {
      const st = stages[o.userData.stage];
      return st && st.fade > 0.3 && st.group.visible;
    });
    const hits = raycaster.intersectObjects(visible, false);
    if(hits.length) onPick(hits[0].object.userData.pick);
  }

  cnv.addEventListener("pointerdown", e => {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    vTheta = 0; vPhi = 0; lastMoveT = performance.now();
    if(pointers.size === 1){
      tap = { x: e.clientX, y: e.clientY, t: performance.now(), moved: false };
    }else{
      if(tap) tap.moved = true;
      const [a, b] = [...pointers.values()];
      pinchD0 = Math.hypot(a.x - b.x, a.y - b.y);
      pinchZ0 = zTarget;
    }
    cnv.setPointerCapture(e.pointerId);
  });
  cnv.addEventListener("pointermove", e => {
    if(!pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    if(tap && Math.hypot(e.clientX - tap.x, e.clientY - tap.y) > 8) tap.moved = true;
    if(pointers.size === 1){
      const dTh = (e.clientX - prev.x) * 0.005;
      const dPh = (e.clientY - prev.y) * 0.005;
      orbit.theta += dTh;
      orbit.phi   -= dPh;
      const now = performance.now();
      const dtm = Math.max(8, now - lastMoveT) / 1000;
      lastMoveT = now;
      vTheta = vTheta * 0.65 + (dTh / dtm) * 0.35;
      vPhi   = vPhi   * 0.65 + (dPh / dtm) * 0.35;
      applyCamera();
    }
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if(pointers.size === 2 && pinchD0 > 0){
      const [a, b] = [...pointers.values()];
      const dNow = Math.hypot(a.x - b.x, a.y - b.y);
      // pinch out (fingers apart) zooms in: Z decreases
      setZ(pinchZ0 + Math.log(pinchD0 / Math.max(20, dNow)) / Math.log(2.0));
    }
  });
  const release = e => {
    if(pointers.size === 1 && tap && !tap.moved && performance.now() - tap.t < 400){
      tryPick(e.clientX, e.clientY);
    }
    pointers.delete(e.pointerId);
    pinchD0 = 0;
    if(pointers.size === 0) tap = null;
  };
  cnv.addEventListener("pointerup", release);
  cnv.addEventListener("pointercancel", e => { pointers.delete(e.pointerId); pinchD0 = 0; tap = null; });
  cnv.addEventListener("wheel", e => {
    e.preventDefault();
    setZ(zTarget + e.deltaY * 0.0016);
  }, { passive: false });
  window.addEventListener("keydown", e => {
    const step = 0.08;
    if(e.key === "ArrowLeft") orbit.theta -= step;
    else if(e.key === "ArrowRight") orbit.theta += step;
    else if(e.key === "ArrowUp") orbit.phi -= step;
    else if(e.key === "ArrowDown") orbit.phi += step;
    else if(e.key === "+" || e.key === "=") { setZ(zTarget - 0.12); return; }
    else if(e.key === "-") { setZ(zTarget + 0.12); return; }
    else return;
    applyCamera();
  });

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const clock = new THREE.Clock();
  function tick(){
    requestAnimationFrame(tick);
    const dt = Math.min(clock.getDelta(), 0.1);
    // zoom easing toward its target
    if(Math.abs(zTarget - Z) > 0.0004){
      Z += (zTarget - Z) * Math.min(1, dt * (reduced ? 30 : 7));
      if(Math.abs(zTarget - Z) <= 0.0004) Z = zTarget;
      if(onZoom) onZoom(Z);
    }
    // rotation inertia after release
    if(!reduced && pointers.size === 0 && (Math.abs(vTheta) + Math.abs(vPhi)) > 0.002){
      orbit.theta += vTheta * dt;
      orbit.phi   -= vPhi * dt;
      const damp = Math.exp(-dt * 3.2);
      vTheta *= damp; vPhi *= damp;
      applyCamera();
    }
    if(!reduced){
      const st0 = stages[0];
      if(st0){
        if(st0.spin) st0.spin.obj.rotation.y += st0.spin.rate * dt * 6;
        for(const pv of st0.moonPivots) pv.rotation.y += pv.userData.speed * dt * 4;
      }
    }
    updateStageTransforms();
    renderer.render(scene, camera);
    if(perfWatch){
      if(perfWatch.skip > 0) perfWatch.skip--;
      else{
        perfWatch.sum += dt; perfWatch.n++;
        if(perfWatch.n >= 90){
          const cb = perfWatch.cb, avg = perfWatch.sum / perfWatch.n * 1000;
          perfWatch = null;
          cb(avg);
        }
      }
    }
  }
  tick();

  // one-frame high-resolution capture. The buffer is rendered once
  // at up to 4x pixel ratio (bounded to ~4096px on the long side),
  // read out as a PNG data url, then everything is restored.
  // Screen-pixel-sized points (the sky) are compensated so the
  // capture matches what the eye sees, only sharper.
  function capture(){
    try{
      const w = window.innerWidth, h = window.innerHeight;
      const prev = renderer.getPixelRatio();
      const pr = Math.max(prev, Math.min(4, 4096 / Math.max(w, h)));
      const comp = [];
      scene.traverse(o => {
        if(o.isPoints && !o.material.sizeAttenuation){
          comp.push({ m: o.material, size: o.material.size });
          o.material.size *= pr / prev;
        }
      });
      renderer.setPixelRatio(pr);
      renderer.setSize(w, h);
      renderer.render(scene, camera);
      const url = renderer.domElement.toDataURL("image/png");
      for(const c of comp) c.m.size = c.size;
      renderer.setPixelRatio(prev);
      renderer.setSize(w, h);
      renderer.render(scene, camera);
      return url;
    }catch(e){
      return null;
    }
  }

  return { buildStages, buildSky, setPickHandler, setZoomHandler, setZ, getZ,
           setDetail, setPixelCap, watchPerf, setContextHandler, capture };
})();

/* ==================== ui ==================== */
(function(){
  const $ = id => document.getElementById(id);
  const seedVal = $("seedVal"), scaleVal = $("scaleVal"), zVal = $("zVal"),
        btnDetail = $("btnDetail"), btnShot = $("btnShot"),
        btnStill = $("btnStill"), stillPanel = $("stillPanel"),
        stillGo = $("stillGo"), stillCancel = $("stillCancel"),
        veilMsg = $("veilMsg"),
        addrText = $("addrText"), fpText = $("fpText"), verifyMsg = $("verifyMsg"),
        btnMark = $("btnMark"), btnBack = $("btnBack"), btnUp = $("btnUp"),
        btnJump = $("btnJump"), btnVerify = $("btnVerify"),
        jumpPanel = $("jumpPanel"), jumpInput = $("jumpInput"),
        jumpGo = $("jumpGo"), jumpCancel = $("jumpCancel"), jumpMsg = $("jumpMsg"),
        nbTrigger = $("nbTrigger"), nbDots = $("nbDots"), nbCount = $("nbCount"),
        nbPanel = $("nbPanel"), nbList = $("nbList"), nbEmpty = $("nbEmpty"),
        nbCopyAll = $("nbCopyAll"), nbPaste = $("nbPaste"), nbClose = $("nbClose"),
        pastePanel = $("pastePanel"), pasteArea = $("pasteArea"),
        pasteImport = $("pasteImport"), pasteCancel = $("pasteCancel"), pasteMsg = $("pasteMsg"),
        toast = $("toast"), veil = $("veil");

  let toastTimer = null;
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
  }
  function copyText(text, doneMsg){
    const fallback = () => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      let ok = false;
      try{ ok = document.execCommand("copy"); }catch(e){}
      document.body.removeChild(ta);
      showToast(ok ? doneMsg : "Copy failed");
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(() => showToast(doneMsg), fallback);
    }else fallback();
  }

  function descColorCss(desc){
    const c = desc.bodyType === "planet" ? desc.params.base : desc.params.color;
    return "rgb(" + Math.round(c[0]*255) + "," + Math.round(c[1]*255) + "," + Math.round(c[2]*255) + ")";
  }
  const codeOf = (kind, fp) => kind + "-" + fp.slice(0, 4).toUpperCase();

  function closePanels(){
    jumpPanel.classList.remove("open");
    nbPanel.classList.remove("open");
    pastePanel.classList.remove("open");
    stillPanel.classList.remove("open");
  }

  /* --- zoom scale path (Phase 3) --- */
  const STAGE_OF_KIND = SE.STAGE_OF_KIND;

  /* --- detail quality (display density only, never identity) --- */
  // std / high / xhigh cycle on the DETAIL row. still sits apart
  // behind its own button + confirmation: a deliberate choice, never
  // an accident. (Current still is provisional — Phase 7 gives it
  // its real art.)
  const QUALITIES = [
    { key: "std",   mult: 1, px: 2 },
    { key: "high",  mult: 2, px: 2 },
    { key: "xhigh", mult: 4, px: 2 },
    { key: "still", mult: 8, px: 3 }
  ];
  let qualityIdx = window.matchMedia && window.matchMedia("(pointer: coarse)").matches ? 0 : 1;
  let qualityMult = QUALITIES[qualityIdx].mult;

  function candInfo(a, anchorCell){
    const d = SE.resolve(a);
    const last = a.segs.length ? a.segs[a.segs.length-1] : null;
    const info = { addrStr: SE.serializeAddress(a), chain: d.chain,
                   colorCss: descColorCss(d), code: codeOf(d.kind, d.fingerprint),
                   segIndex: 0, radius: 1, fkind: null, cellDelta: [0,0,0] };
    if(last){
      if(last.k === "W"){
        info.segIndex = last.f.id;
        info.fkind = last.f.kind;
        if(anchorCell) info.cellDelta = [
          last.cell[0]-anchorCell[0], last.cell[1]-anchorCell[1], last.cell[2]-anchorCell[2]];
      }else info.segIndex = last.i;
    }
    if(d.bodyType === "planet") info.radius = d.params.radius;
    return info;
  }

  // stage j shows the children of its anchor; the child lying on the
  // focus path is anchored at the origin (out-of-range focus indices
  // are appended so they stay visible and anchorable)
  function stageData(anchors){
    const data = new Array(5).fill(null);
    if(anchors[0]){
      const desc = SE.resolve(anchors[0]);
      const children = desc.kind === "P"
        ? SE.neighborhood(anchors[0]).children.map(a => candInfo(a)) : [];
      data[0] = { desc, addrStr: SE.serializeAddress(anchors[0]), children };
    }
    for(let j = 1; j <= 3; j++){
      if(!anchors[j]) continue;
      const desc = SE.resolve(anchors[j]);
      const children = SE.neighborhood(anchors[j]).children.map(a => candInfo(a));
      let focused = anchors[j-1];
      if(focused && j === 1 && SE.deepestKind(focused) === "M"){
        focused = SE.parentAddress(focused);   // moon focus: anchor its planet
      }
      let focusedAddrStr = null;
      if(focused){
        focusedAddrStr = SE.serializeAddress(focused);
        if(!children.some(c => c.addrStr === focusedAddrStr)) children.push(candInfo(focused));
      }
      data[j] = { desc, addrStr: SE.serializeAddress(anchors[j]), children, focusedAddrStr };
    }
    if(anchors[4]){
      const desc = SE.resolve(anchors[4]);
      const wseg = anchors[4].segs[anchors[4].segs.length-1];
      const cell = wseg.cell;
      const U = 1.25; // cell units -> stage units
      const focusDet = SE.webFeature(anchors[4].seed, wseg);
      const anchorPos = focusDet.exists ? focusDet.pos
        : [cell[0]+0.5, cell[1]+0.5, cell[2]+0.5]; // out-of-enumeration fallback
      const rel = p => [(p[0]-anchorPos[0])*U, (p[1]-anchorPos[1])*U, (p[2]-anchorPos[2])*U];
      const focusedAddrStr = SE.serializeAddress(anchors[4]);
      const children = [];
      for(const a of [anchors[4], ...SE.neighborhood(anchors[4]).siblings]){
        const det = SE.webFeature(a.seed, a.segs[a.segs.length-1]);
        const c = candInfo(a);
        if(det.exists) c.pos = rel(det.pos);
        else if(c.addrStr === focusedAddrStr) c.pos = [0,0,0];
        else continue; // out-of-enumeration siblings have no placement
        children.push(c);
      }
      // dust over a ±2 cell box with spherical feathering: the
      // observer sits inside the medium; the dark past the dust is
      // the limit of sight, not an edge
      const FEATHER = [1.4, 2.7];
      const raw = SE.sampleWebDust(anchors[4].seed, cell, 2, 600000 * qualityMult, FEATHER);
      const dustPts = [], dustW = Array.from(raw.w);
      for(let i = 0; i < raw.pts.length; i += 3){
        const p = rel([raw.pts[i], raw.pts[i+1], raw.pts[i+2]]);
        dustPts.push(p[0], p[1], p[2]);
      }
      // the far annulus (±4 cells): sparse, dim structure past the
      // horizon of reach, so the large-scale web reads as continuing
      // in every direction instead of a thin local shell
      const far = SE.sampleWebDust(anchors[4].seed, cell, 4,
        Math.min(600000, 90000 * qualityMult), [3.2, 4.7], 2.55);
      for(let i = 0; i < far.pts.length; i += 3){
        const p = rel([far.pts[i], far.pts[i+1], far.pts[i+2]]);
        dustPts.push(p[0], p[1], p[2]);
        dustW.push(far.w[i/3] * 0.55);
      }
      // far hints (high detail and above): nodes in the outer shell
      // baked into the dust as slightly brighter specks — structure
      // continues past reach, without interactive sprites out there
      if(qualityMult >= 2){
        const rngF = SE.mulberry32(SE.chain(SE.chainHash(anchors[4]), 0xFA96));
        const fw = p => {
          const dx = p[0]-(cell[0]+0.5), dy = p[1]-(cell[1]+0.5), dz = p[2]-(cell[2]+0.5);
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
          return Math.max(0, Math.min(1, 1 - (dist - FEATHER[0]) / (FEATHER[1] - FEATHER[0])));
        };
        for(let dx = -2; dx <= 2; dx++)
          for(let dy = -2; dy <= 2; dy++)
            for(let dz = -2; dz <= 2; dz++){
              if(Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) !== 2) continue;
              const nodes = SE.cellFeatures(anchors[4].seed, [cell[0]+dx, cell[1]+dy, cell[2]+dz]).node;
              for(const nd of nodes){
                const f = fw(nd.pos);
                if(f <= 0.02) continue;
                for(let k = 0; k < 8; k++){
                  const p = [nd.pos[0] + (rngF()-0.5)*0.10,
                             nd.pos[1] + (rngF()-0.5)*0.10,
                             nd.pos[2] + (rngF()-0.5)*0.10];
                  const q = rel(p);
                  dustPts.push(q[0], q[1], q[2]);
                  dustW.push((0.5 + 0.4*rngF()) * f);
                }
              }
            }
      }
      data[4] = { desc, addrStr: focusedAddrStr, children, focusedAddrStr,
                  dust: { pts: dustPts, w: dustW } };
    }
    return data;
  }

  /* --- focus --- */
  function focusAddress(addr, opts){
    opts = opts || {};
    const str = SE.serializeAddress(addr);
    if(state.addrStr && str !== state.addrStr && !opts.noHistory){
      state.prevAddrStr = state.addrStr;
    }
    state.addr = addr;          // focus target: the truth of the path
    state.addrStr = str;
    state.anchors = SE.zoomPath(addr);
    state.data = stageData(state.anchors);
    // the sky seen from inside: derived from the home galaxy and the
    // neighbouring galaxies of its cluster (display only, no identity)
    const gEntry = state.data[2];
    const sysChain = state.data[1] ? state.data[1].desc.chain : SE.chainHash(addr);
    const neighbors = state.data[3]
      ? state.data[3].children.filter(c => !gEntry || c.addrStr !== gEntry.addrStr)
      : [];
    R.buildSky({
      chain: sysChain,
      galaxyChain: gEntry ? gEntry.desc.chain : 0,
      hasGalaxy: !!gEntry,
      tint: gEntry ? gEntry.desc.params.color : [0.8, 0.85, 1],
      neighbors
    });
    const z = opts.z !== undefined ? opts.z : STAGE_OF_KIND[SE.deepestKind(addr)];
    R.buildStages(state.data, z);
    syncView(true);
  }
  function transitionTo(addr, z){
    veil.classList.add("on");
    setTimeout(() => {
      focusAddress(addr, { z });
      setTimeout(() => veil.classList.remove("on"), 60);
    }, 290);
  }

  /* --- view follows the main zoom scale --- */
  function mainStageFor(z){
    let best = 0, bd = Infinity;
    for(let j = 0; j < 5; j++){
      if(!state.data || !state.data[j]) continue;
      const d = Math.abs(j - z);
      if(d < bd){ bd = d; best = j; }
    }
    return best;
  }
  function syncView(force){
    const z = R.getZ();
    zVal.textContent = z.toFixed(2);
    const m = mainStageFor(z);
    if(!force && m === state.viewStage) return;
    state.viewStage = m;
    const d = state.data[m];
    state.viewAddrStr = d.addrStr;
    state.viewDesc = d.desc;
    updateHud();
  }
  R.setZoomHandler(() => syncView(false));

  R.setPickHandler(c => {
    // tapping something already on the focus path just zooms to it
    for(let j = 0; j < 5; j++){
      if(state.data[j] && state.data[j].addrStr === c.addrStr){ R.setZ(j); return; }
    }
    const r = SE.parseAddress(c.addrStr);
    if(!r.ok) return;
    showToast("→ " + c.code);
    transitionTo(r.addr, STAGE_OF_KIND[SE.deepestKind(r.addr)]);
  });

  btnUp.addEventListener("click", () => {
    for(let j = state.viewStage + 1; j < 5; j++){
      if(state.data[j]){ R.setZ(j); return; }
    }
  });

  function updateHud(){
    seedVal.textContent = state.addr.seed;
    scaleVal.textContent = state.viewDesc.kindLabel.toUpperCase();
    addrText.textContent = state.viewAddrStr;
    fpText.textContent = state.viewDesc.fingerprint;
    verifyMsg.textContent = "";
    btnBack.disabled = !state.prevAddrStr;
    btnUp.disabled = state.viewStage >= 4 || !state.data.slice(state.viewStage + 1).some(d => d);
    const marked = state.bookmarks.some(b => b.a === state.viewAddrStr);
    btnMark.textContent = marked ? "✦" : "✧";
    btnMark.classList.toggle("active", marked);
    renderDots();
  }

  /* --- address line: tap to copy (the address of the scale in view) --- */
  $("addrLine").addEventListener("click", () => copyText(state.viewAddrStr, "Copied"));

  /* --- verify: cache-independent regeneration check --- */
  btnVerify.addEventListener("click", () => {
    const r = SE.parseAddress(state.viewAddrStr);        // roundtrip from string
    if(!r.ok){ verifyMsg.textContent = "parse failed"; verifyMsg.style.color = "var(--bad)"; return; }
    const fresh = SE.resolveFresh(r.addr);               // bypass cache entirely
    const same = fresh.fingerprint === state.viewDesc.fingerprint
              && SE.serializeAddress(r.addr) === state.viewAddrStr;
    verifyMsg.textContent = same ? "OK · regenerated " + fresh.fingerprint : "MISMATCH " + fresh.fingerprint;
    verifyMsg.style.color = same ? "var(--ok)" : "var(--bad)";
  });

  /* --- jump --- */
  btnJump.addEventListener("click", () => {
    closePanels();
    jumpPanel.classList.add("open");
    jumpMsg.textContent = "";
    jumpInput.value = state.viewAddrStr;
    jumpInput.focus();
    jumpInput.select();
  });
  jumpCancel.addEventListener("click", () => jumpPanel.classList.remove("open"));
  function doJump(){
    const r = SE.parseAddress(jumpInput.value);
    if(!r.ok){ jumpMsg.textContent = r.error; return; }
    jumpPanel.classList.remove("open");
    if(SE.serializeAddress(r.addr) === state.addrStr) return;
    transitionTo(r.addr);
  }
  jumpGo.addEventListener("click", doJump);
  jumpInput.addEventListener("keydown", e => { if(e.key === "Enter") doJump(); });

  /* --- back --- */
  btnBack.addEventListener("click", () => {
    if(!state.prevAddrStr) return;
    const r = SE.parseAddress(state.prevAddrStr);
    if(!r.ok) return;
    state.prevAddrStr = null;
    transitionTo(r.addr);
  });

  /* --- bookmarks (notebook) --- */
  let dotsKey = null;
  function renderDots(){
    const key = state.bookmarks.map(b => b.a).join("|");
    if(key === dotsKey) return;   // rebuild only on change, so the
    dotsKey = key;                // scale-in plays once per new mark
    nbDots.innerHTML = "";
    const show = state.bookmarks.slice(-8);
    for(const b of show){
      const d = document.createElement("div");
      d.className = "nbDot";
      d.style.color = b.colorCss;
      d.style.background = b.colorCss;
      nbDots.appendChild(d);
    }
    nbCount.textContent = "✧ " + state.bookmarks.length;
  }
  function renderList(){
    nbList.innerHTML = "";
    nbEmpty.style.display = state.bookmarks.length ? "none" : "block";
    for(const b of state.bookmarks){
      const row = document.createElement("div");
      row.className = "nbRow";
      const chip = document.createElement("div");
      chip.className = "nbChip";
      chip.style.color = b.colorCss;
      chip.style.background = b.colorCss;
      const code = document.createElement("span");
      code.className = "nbCode";
      code.textContent = b.code;
      const kind = document.createElement("span");
      kind.className = "nbKind";
      kind.textContent = b.kind;
      const del = document.createElement("button");
      del.className = "nbDel";
      del.textContent = "×";
      del.addEventListener("click", e => {
        e.stopPropagation();
        state.bookmarks = state.bookmarks.filter(x => x.a !== b.a);
        renderList(); renderDots(); updateHud();
        showToast("Removed");
      });
      row.append(chip, code, kind, del);
      row.addEventListener("click", () => {
        const r = SE.parseAddress(b.a);
        if(!r.ok) return;
        closePanels();
        for(let j = 0; j < 5; j++){
          if(state.data && state.data[j] && state.data[j].addrStr === b.a){ R.setZ(j); return; }
        }
        transitionTo(r.addr);
      });
      nbList.appendChild(row);
    }
  }
  function addBookmark(addrStr, desc){
    if(state.bookmarks.some(b => b.a === addrStr)) return false;
    state.bookmarks.push({
      a: addrStr, fp: desc.fingerprint,
      code: codeOf(desc.kind, desc.fingerprint),
      kind: desc.kindLabel, colorCss: descColorCss(desc)
    });
    return true;
  }
  btnMark.addEventListener("click", () => {
    const idx = state.bookmarks.findIndex(b => b.a === state.viewAddrStr);
    if(idx >= 0){
      state.bookmarks.splice(idx, 1);
      showToast("Removed");
    }else{
      addBookmark(state.viewAddrStr, state.viewDesc);
      showToast("Marked " + codeOf(state.viewDesc.kind, state.viewDesc.fingerprint));
    }
    renderList();
    updateHud();
  });
  nbTrigger.addEventListener("click", () => {
    const open = nbPanel.classList.contains("open");
    closePanels();
    if(!open){ renderList(); nbPanel.classList.add("open"); }
  });
  nbClose.addEventListener("click", () => nbPanel.classList.remove("open"));
  nbCopyAll.addEventListener("click", () => {
    if(!state.bookmarks.length){ showToast("Notebook is empty"); return; }
    copyText(state.bookmarks.map(b => b.a).join("\n"), "Copied " + state.bookmarks.length + " addresses");
  });
  nbPaste.addEventListener("click", () => {
    nbPanel.classList.remove("open");
    pastePanel.classList.add("open");
    pasteArea.value = "";
    pasteMsg.textContent = "";
    pasteArea.focus();
  });
  pasteCancel.addEventListener("click", () => {
    pastePanel.classList.remove("open");
    nbPanel.classList.add("open");
    renderList();
  });
  pasteImport.addEventListener("click", () => {
    const lines = pasteArea.value.split("\n").map(s => s.trim()).filter(s => s.length);
    let added = 0, invalid = 0, dup = 0;
    for(const line of lines){
      const r = SE.parseAddress(line);
      if(!r.ok){ invalid++; continue; }
      const canon = SE.serializeAddress(r.addr);
      const desc = SE.resolve(r.addr);
      if(addBookmark(canon, desc)) added++; else dup++;
    }
    if(added === 0 && (invalid || dup)){
      pasteMsg.textContent = invalid ? invalid + " invalid" : "already in notebook";
      return;
    }
    pastePanel.classList.remove("open");
    nbPanel.classList.add("open");
    renderList(); updateHud();
    let msg = added + " added";
    if(invalid) msg += " · " + invalid + " invalid";
    showToast(msg);
  });

  /* --- detail switching --- */
  function applyQuality(i, rebuild){
    qualityIdx = i;
    qualityMult = QUALITIES[i].mult;
    btnDetail.textContent = QUALITIES[i].key;
    btnStill.classList.toggle("active", i === 3);
    R.setDetail(QUALITIES[i].mult);
    R.setPixelCap(QUALITIES[i].px);
    if(rebuild){
      veilMsg.textContent = "rendering";
      veil.classList.add("on");
      setTimeout(() => {
        focusAddress(state.addr, { noHistory: true, z: R.getZ() });
        veilMsg.textContent = "";
        setTimeout(() => veil.classList.remove("on"), 60);
        // watch the frame time after heavy switches; step back down
        // before the device suffers
        if(i >= 2){
          R.watchPerf(avgMs => {
            if(avgMs > 90 && qualityIdx === i && qualityIdx > 0){
              applyQuality(qualityIdx - 1, true);
              showToast("Detail lowered · performance");
            }
          });
        }
      }, 290);
    }
  }
  // the DETAIL button cycles the everyday tiers only; from still it
  // returns to std
  btnDetail.addEventListener("click", () =>
    applyQuality(qualityIdx === 3 ? 0 : (qualityIdx + 1) % 3, true));

  /* --- still: a deliberate choice behind its own confirmation --- */
  btnStill.addEventListener("click", () => {
    if(qualityIdx === 3){ applyQuality(0, true); return; } // toggle off
    closePanels();
    stillPanel.classList.add("open");
  });
  stillCancel.addEventListener("click", () => stillPanel.classList.remove("open"));
  stillGo.addEventListener("click", () => {
    stillPanel.classList.remove("open");
    applyQuality(3, true);
  });

  /* --- capture: one frame, up to 4x resolution, saved as png --- */
  btnShot.addEventListener("click", () => {
    closePanels();
    const url = R.capture();
    if(!url){ showToast("Capture failed"); return; }
    const a = document.createElement("a");
    a.href = url;
    a.download = "space-" + state.viewDesc.fingerprint + ".png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast("Captured");
  });

  /* --- safety net: whatever happens, land on std --- */
  R.setContextHandler(() => {
    applyQuality(0, true);
    showToast("Detail reset · graphics recovered");
  });

  /* --- boot: the whole web first, then down to a world --- */
  applyQuality(qualityIdx, false);
  focusAddress(SE.initialAddress(DEFAULT_SEED), { noHistory: true, z: 4 });
})();
</script>
