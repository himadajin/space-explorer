<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>space-explorer</title>
<style>
  :root{
    --void:#04060b;
    --ink:rgba(205,220,240,0.88);
    --dim:rgba(145,165,195,0.48);
    --faint:rgba(145,165,195,0.26);
    --line:rgba(160,185,215,0.16);
    --panel:rgba(8,12,20,0.86);
    --ok:#93d9ad;
    --bad:#e09090;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);
    font-family:var(--sans);user-select:none;-webkit-user-select:none;touch-action:none}
  #scene{position:fixed;inset:0}
  canvas{display:block}

  .label{font-size:9px;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase}
  .mono{font-family:var(--mono)}

  /* top-left readout */
  #readout{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);left:16px;
    display:flex;flex-direction:column;gap:8px;pointer-events:none}
  #readout .row{display:flex;align-items:baseline;gap:8px}
  #readout .val{font-family:var(--mono);font-size:11px;color:var(--ink)}
  #metaRow{display:flex;align-items:baseline;gap:8px;min-width:0}
  #metaRow .val{font-family:var(--mono);font-size:10px;color:var(--dim)}
  .spacer{flex:1}
  #verifyMsg{font-family:var(--mono);font-size:10px;letter-spacing:0.05em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .btn.mini{padding:5px 10px;font-size:9px}
  .btn.sym.mini{padding:3px 8px;font-size:11px}
  #stillNote{font-size:10px;color:var(--dim);letter-spacing:0.05em}
  #veilMsg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    font-size:9px;letter-spacing:0.3em;color:var(--faint);text-transform:uppercase}
  @keyframes panelIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  @keyframes dotIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

  /* top-right notebook trigger: column of marks */
  #nbTrigger{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);right:16px;
    display:flex;flex-direction:column;align-items:flex-end;gap:7px;cursor:pointer;
    padding:2px 2px 10px 14px}
  #nbDots{display:flex;flex-direction:column;gap:7px;align-items:flex-end}
  .nbDot{width:5px;height:5px;border-radius:50%;box-shadow:0 0 6px currentColor;animation:dotIn .25s ease-out}
  #nbCount{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:0.1em}

  /* bottom HUD */
  #hud{position:fixed;left:0;right:0;bottom:0;display:flex;flex-direction:column;gap:10px;
    padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 16px);
    background:linear-gradient(to top,rgba(4,6,11,0.85),rgba(4,6,11,0))}
  #addrLine{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0}
  #addrText{font-family:var(--mono);font-size:11px;color:var(--ink);letter-spacing:0.02em;
    white-space:nowrap;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0;
    border-bottom:1px solid var(--line);padding-bottom:5px;touch-action:pan-x}
  #addrText::-webkit-scrollbar{display:none}
  #fpText{font-family:var(--mono);font-size:10px;color:var(--dim)}
  #btnRow{display:flex;gap:8px;flex-wrap:wrap}
  .btn{appearance:none;background:transparent;border:1px solid var(--line);color:var(--dim);
    font-family:var(--sans);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
    padding:9px 14px;border-radius:2px;cursor:pointer;transition:color .2s,border-color .2s}
  .btn:hover,.btn:focus-visible{color:var(--ink);border-color:var(--dim);outline:none}
  .btn:focus-visible{box-shadow:0 0 0 1px var(--dim)}
  .btn[disabled]{opacity:0.3;pointer-events:none}
  .btn.active{color:var(--ink);border-color:var(--dim)}
  .btn.sym{font-size:13px;letter-spacing:0;padding:7px 15px;line-height:1}

  /* panels */
  .panel{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom,0px) + 110px);
    width:min(480px,calc(100vw - 24px));background:var(--panel);
    border:1px solid var(--line);border-radius:3px;padding:14px;
    display:none;flex-direction:column;gap:10px;backdrop-filter:blur(6px)}
  .panel.open{display:flex;animation:panelIn .16s ease-out}
  .nbRow:active{background:rgba(160,185,215,0.06)}
  .panel input[type=text],.panel textarea{width:100%;background:rgba(255,255,255,0.03);
    border:1px solid var(--line);border-radius:2px;color:var(--ink);
    font-family:var(--mono);font-size:11px;padding:9px;outline:none}
  .panel input[type=text]:focus,.panel textarea:focus{border-color:var(--dim)}
  .panel textarea{height:90px;resize:none}
  .panelRow{display:flex;gap:8px;justify-content:flex-end;align-items:center}
  .panelMsg{font-family:var(--mono);font-size:10px;color:var(--bad);flex:1;min-height:12px}

  /* notebook drawer */
  #nbList{display:flex;flex-direction:column;max-height:38vh;overflow-y:auto;overscroll-behavior:contain}
  .nbRow{display:flex;align-items:center;gap:10px;padding:9px 4px;cursor:pointer;
    border-bottom:1px solid rgba(160,185,215,0.07)}
  .nbRow:last-child{border-bottom:none}
  .nbRow:hover .nbCode{color:var(--ink)}
  .nbChip{width:8px;height:8px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  .nbCode{font-family:var(--mono);font-size:11px;color:var(--ink);letter-spacing:0.06em}
  .nbKind{font-size:8px;letter-spacing:0.18em;color:var(--faint);text-transform:uppercase;flex:1}
  .nbDel{background:none;border:none;color:var(--faint);font-size:13px;cursor:pointer;padding:2px 6px}
  .nbDel:hover{color:var(--bad)}
  #nbEmpty{font-size:10px;color:var(--faint);letter-spacing:0.1em;padding:10px 2px;text-align:center}

  /* toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom,0px) + 160px);
    background:var(--panel);border:1px solid var(--line);border-radius:2px;
    font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--ink);
    padding:8px 14px;opacity:0;pointer-events:none;transition:opacity .25s}
  #toast.show{opacity:1}

  /* jump fade */
  #veil{position:fixed;inset:0;background:var(--void);opacity:0;pointer-events:none;transition:opacity .28s}
  #veil.on{opacity:1}

  @media (prefers-reduced-motion: reduce){
    #veil{transition:none} #toast{transition:none}
  }
</style>
</head>
<body>
<div id="scene"></div>

<div id="readout">
  <div class="row"><span class="label">seed</span><span class="val" id="seedVal"></span></div>
  <div class="row"><span class="label">scale</span><span class="val" id="scaleVal"></span></div>
</div>

<div id="nbTrigger" title="Notebook">
  <div id="nbDots"></div>
  <div id="nbCount">✧ 0</div>
</div>

<div id="hud">
  <div id="addrLine" title="Copy address">
    <span class="label">address</span>
    <span id="addrText" class="mono"></span>
  </div>
  <div id="metaRow">
    <span class="label">fp</span>
    <span id="fpText"></span>
    <button class="btn sym mini" id="btnVerify" title="Verify" aria-label="Verify">✓</button>
    <span id="verifyMsg"></span>
    <span class="spacer"></span>
    <span class="label">z</span>
    <span class="val mono" id="zVal"></span>
  </div>
  <div id="btnRow">
    <button class="btn sym" id="btnMark" title="Mark" aria-label="Mark">✧</button>
    <button class="btn sym" id="btnUp" title="Up" aria-label="Up" disabled>↑</button>
    <button class="btn sym" id="btnBack" title="Back" aria-label="Back" disabled>←</button>
    <button class="btn sym" id="btnJump" title="Jump" aria-label="Jump">⌖</button>
    <span class="spacer"></span>
    <button class="btn" id="btnDetail" title="Detail" aria-label="Detail"></button>
    <button class="btn" id="btnStill" title="Still" aria-label="Still">Still</button>
    <button class="btn sym" id="btnShot" title="Capture" aria-label="Capture">◉</button>
  </div>
</div>

<div class="panel" id="jumpPanel">
  <span class="label">jump</span>
  <input type="text" id="jumpInput" autocomplete="off" autocapitalize="off" spellcheck="false">
  <div class="panelRow">
    <span class="panelMsg" id="jumpMsg"></span>
    <button class="btn sym" id="jumpCancel" title="Cancel" aria-label="Cancel">✕</button>
    <button class="btn sym" id="jumpGo" title="Go" aria-label="Go">↵</button>
  </div>
</div>

<div class="panel" id="nbPanel">
  <span class="label">notebook</span>
  <div id="nbList"></div>
  <div id="nbEmpty">nothing written down yet</div>
  <div class="panelRow">
    <button class="btn sym" id="nbCopyAll" title="Copy all" aria-label="Copy all">⧉</button>
    <button class="btn sym" id="nbPaste" title="Paste" aria-label="Paste">＋</button>
    <button class="btn sym" id="nbClose" title="Close" aria-label="Close">✕</button>
  </div>
</div>

<div class="panel" id="pastePanel">
  <span class="label">paste · one per line</span>
  <textarea id="pasteArea" autocapitalize="off" spellcheck="false"></textarea>
  <div class="panelRow">
    <span class="panelMsg" id="pasteMsg"></span>
    <button class="btn sym" id="pasteCancel" title="Cancel" aria-label="Cancel">✕</button>
    <button class="btn sym" id="pasteImport" title="Import" aria-label="Import">↵</button>
  </div>
</div>

<div class="panel" id="stillPanel">
  <span class="label">still · maximum detail</span>
  <span id="stillNote">Heavy load. May be unstable on some devices.</span>
  <div class="panelRow">
    <button class="btn sym" id="stillCancel" title="Cancel" aria-label="Cancel">✕</button>
    <button class="btn sym" id="stillGo" title="Enable" aria-label="Enable">↵</button>
  </div>
</div>

<div id="toast"></div>
<div id="veil"><span id="veilMsg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
/* ============================================================
   space-explorer · Phase 1
   Sections: core/hash, core/address, gen, state, render, ui
   The CORE block (between CORE-BEGIN / CORE-END) is pure JS with
   no DOM or THREE dependency, so it can also run under Node.js
   for deterministic regression checks.
   ============================================================ */

/* CORE-BEGIN */
/* ==================== core/hash ==================== */
const SE = (function(){

  function mix32(h){
    h = h >>> 0;
    h ^= h >>> 16; h = Math.imul(h, 0x21f0aaad);
    h ^= h >>> 15; h = Math.imul(h, 0x735a2d97);
    h ^= h >>> 15;
    return h >>> 0;
  }
  // splitmix-style chain combine: order-sensitive, deterministic
  function combine(h, x){
    h = (h ^ mix32((x >>> 0) + 0x9e3779b9)) >>> 0;
    return mix32((h + 0x85ebca6b) >>> 0);
  }
  function chain(h, ...xs){ for(const x of xs) h = combine(h, x); return h; }
  function hashStr(s){
    let h = 0x811c9dc5;
    for(let i = 0; i < s.length; i++){
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return mix32(h);
  }
  function mulberry32(a){
    a = a >>> 0;
    return function(){
      a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const hex8 = h => (h >>> 0).toString(16).padStart(8, "0");

  /* ==================== core/address ==================== */
  // Segment order: S -> W -> C -> G -> Y -> P -> M
  // Any suffix may be omitted; interior segments may be skipped
  // (e.g. a galaxy directly on a filament: S/W/G). Order is fixed.
  const SEG_ORDER = ["W","C","G","Y","P","M"];
  const WEB_KINDS = ["void","wall","filament","node"];
  const KIND_LABEL = { S:"seed", W:"web", C:"cluster", G:"galaxy", Y:"system", P:"planet", M:"moon" };
  const TAG = { S:0x53, W:0x57, C:0x43, G:0x47, Y:0x59, P:0x50, M:0x4d, INIT:0x1234abcd, LOCAL_NONE:0x7fffffff };
  const MAX_INDEX = 1000000;

  function serializeAddress(a){
    const parts = ["S" + a.seed];
    for(const s of a.segs){
      if(s.k === "W"){
        let t = "W:cell=" + s.cell.join(",") + ";f=" + s.f.kind + "," + s.f.id;
        if(s.f.local !== undefined) t += "," + s.f.local;
        parts.push(t);
      }else{
        parts.push(s.k + ":" + s.i);
      }
    }
    return parts.join("/");
  }

  function fail(error){ return { ok:false, error }; }
  const isInt = n => Number.isInteger(n);

  function parseAddress(str){
    if(typeof str !== "string") return fail("empty");
    const parts = str.trim().split("/").filter(p => p.length > 0);
    if(parts.length === 0) return fail("empty");
    const head = parts[0];
    if(!/^S[A-Za-z0-9\-]{1,32}$/.test(head)) return fail("bad seed segment");
    const addr = { seed: head.slice(1), segs: [] };
    let orderPos = -1;
    for(let i = 1; i < parts.length; i++){
      const p = parts[i];
      const k = p[0];
      const pos = SEG_ORDER.indexOf(k);
      if(pos < 0) return fail("unknown segment '" + k + "'");
      if(pos <= orderPos) return fail("segment order violated at '" + k + "'");
      orderPos = pos;
      if(k === "W"){
        const body = p.slice(2);
        if(p[1] !== ":") return fail("bad W segment");
        const fields = {};
        for(const kv of body.split(";")){
          const eq = kv.indexOf("=");
          if(eq < 0) return fail("bad W field '" + kv + "'");
          fields[kv.slice(0, eq)] = kv.slice(eq + 1);
        }
        if(!fields.cell || !fields.f) return fail("W needs cell and f");
        const cell = fields.cell.split(",").map(Number);
        if(cell.length !== 3 || !cell.every(isInt)) return fail("bad cell coords");
        if(!cell.every(c => Math.abs(c) < MAX_INDEX)) return fail("cell out of range");
        const fp = fields.f.split(",");
        if(fp.length < 2 || fp.length > 3) return fail("bad f field");
        if(!WEB_KINDS.includes(fp[0])) return fail("bad web kind '" + fp[0] + "'");
        const id = Number(fp[1]);
        if(!isInt(id) || id < 0 || id >= MAX_INDEX) return fail("bad f id");
        const f = { kind: fp[0], id };
        if(fp.length === 3){
          const local = Number(fp[2]);
          if(!isInt(local) || local < 0 || local >= MAX_INDEX) return fail("bad f local");
          f.local = local;
        }
        addr.segs.push({ k:"W", cell, f });
      }else{
        const m = /^[CGYPM]:(\d{1,7})$/.exec(p);
        if(!m) return fail("bad segment '" + p + "'");
        const idx = Number(m[1]);
        if(idx >= MAX_INDEX) return fail("index out of range");
        addr.segs.push({ k, i: idx });
      }
    }
    return { ok:true, addr };
  }

  function chainHash(addr){
    let h = chain(hashStr(addr.seed), TAG.S);
    for(const s of addr.segs){
      if(s.k === "W"){
        h = chain(h, TAG.W, s.cell[0], s.cell[1], s.cell[2],
                  WEB_KINDS.indexOf(s.f.kind), s.f.id,
                  s.f.local === undefined ? TAG.LOCAL_NONE : s.f.local);
      }else{
        h = chain(h, TAG[s.k], s.i);
      }
    }
    return h;
  }

  function deepestKind(addr){
    return addr.segs.length ? addr.segs[addr.segs.length - 1].k : "S";
  }

  /* ==================== gen ==================== */
  const q = (v, s=1000) => Math.round(v * s);

  // hue helpers on plain numbers so fingerprints stay DOM/THREE-free
  function hsl2rgb(h, s, l){
    h = ((h % 1) + 1) % 1;
    const f = n => {
      const k = (n + h * 12) % 12;
      return l - s * Math.min(l, 1 - l) * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    };
    return [f(0), f(8), f(4)];
  }
  const rgbInt = c => (q(c[0],255) << 16) | (q(c[1],255) << 8) | q(c[2],255);

  function genPlanet(rng, isMoon){
    const roll = rng();
    const archetype = isMoon ? (roll < 0.8 ? "rocky" : "ice")
                    : (roll < 0.55 ? "rocky" : roll < 0.80 ? "gas" : "ice");
    const radius = isMoon ? 0.45 + rng() * 0.35
                 : archetype === "gas" ? 1.0 + rng() * 0.6
                 : 0.55 + rng() * 0.45;
    let hue, sat, lit;
    if(archetype === "rocky"){ hue = [0.02,0.07,0.10,0.32,0.58][Math.floor(rng()*5)] + rng()*0.03; sat = 0.25 + rng()*0.3; lit = 0.34 + rng()*0.14; }
    else if(archetype === "gas"){ hue = [0.06,0.09,0.13,0.48,0.90][Math.floor(rng()*5)] + rng()*0.04; sat = 0.30 + rng()*0.35; lit = 0.48 + rng()*0.16; }
    else { hue = 0.50 + rng()*0.14; sat = 0.12 + rng()*0.22; lit = 0.62 + rng()*0.18; }
    const base = hsl2rgb(hue, sat, lit);
    const alt  = hsl2rgb(hue + (rng()-0.5)*0.09, sat*(0.7+rng()*0.5), lit*(0.72+rng()*0.3));
    const band = hsl2rgb(hue + (rng()-0.5)*0.16, Math.min(1, sat*1.2), lit*(0.85+rng()*0.35));
    const pole = hsl2rgb(hue + 0.02, sat*0.25, 0.82 + rng()*0.12);
    const atmo = hsl2rgb(hue + (rng() < 0.5 ? 0.05 : -0.05), 0.5, 0.65);
    const hasAtmo = archetype === "gas" ? true : rng() < 0.6;
    const bands = archetype === "gas" ? 4 + Math.floor(rng()*7) : 0;
    const noiseScale = 2.5 + rng()*4;
    const poleCap = archetype !== "gas" && rng() < 0.55 ? 0.72 + rng()*0.15 : 0;
    const tilt = (rng()-0.5) * 0.9;
    const spin = 0.03 + rng()*0.08;
    const ringRoll = rng();
    const ringP = archetype === "gas" ? 0.45 : archetype === "ice" ? 0.15 : 0.05;
    let ring = null;
    if(!isMoon && ringRoll < ringP){
      ring = {
        inner: 1.35 + rng()*0.25,
        outer: 1.9 + rng()*0.7,
        alpha: 0.35 + rng()*0.35,
        tint: hsl2rgb(hue + (rng()-0.5)*0.06, sat*0.5, 0.6 + rng()*0.2),
        seed: Math.floor(rng()*0xffffffff)
      };
    }
    const moonCount = isMoon ? 0
      : Math.floor(rng() * (archetype === "gas" ? 5.6 : 3.4));
    const moons = [];
    for(let i = 0; i < moonCount; i++){
      moons.push({
        size: 0.05 + rng()*0.07,
        dist: 2.1 + i*0.75 + rng()*0.5,
        speed: (0.10 + rng()*0.16) * (rng() < 0.12 ? -1 : 1),
        phase: rng()*Math.PI*2,
        incl: (rng()-0.5)*0.4,
        shade: 0.45 + rng()*0.35
      });
    }
    return { archetype, radius, base, alt, band, pole, atmo, hasAtmo,
             bands, noiseScale, poleCap, tilt, spin, ring, moons };
  }

  // Proxy bodies for addresses that stop above planet depth.
  // Phase 1 renders these as calm glowing spheres; later phases
  // replace them with real scale representations.
  function genProxy(rng, kind){
    const hueBase = { S:0.62, W:0.58, C:0.75, G:0.68, Y:0.12 }[kind];
    const hue = hueBase + (rng()-0.5)*0.1;
    const color = hsl2rgb(hue, 0.45 + rng()*0.3, 0.6 + rng()*0.2);
    return { color, radius: 0.9, glow: 0.6 + rng()*0.4, pulse: 0.4 + rng()*0.6 };
  }

  function fingerprintPlanet(p){
    let h = 0xC0FFEE11;
    h = chain(h, hashStr(p.archetype), q(p.radius),
      rgbInt(p.base), rgbInt(p.alt), rgbInt(p.band), rgbInt(p.pole), rgbInt(p.atmo),
      p.hasAtmo ? 1 : 0, p.bands, q(p.noiseScale), q(p.poleCap), q(p.tilt), q(p.spin));
    if(p.ring) h = chain(h, 1, q(p.ring.inner), q(p.ring.outer), q(p.ring.alpha), rgbInt(p.ring.tint), p.ring.seed);
    else h = chain(h, 0);
    h = chain(h, p.moons.length);
    for(const m of p.moons) h = chain(h, q(m.size), q(m.dist), q(m.speed), q(m.phase), q(m.incl), q(m.shade));
    return hex8(h);
  }
  function fingerprintProxy(kind, p){
    return hex8(chain(0xC0FFEE22, hashStr(kind), rgbInt(p.color), q(p.glow), q(p.pulse)));
  }

  // A moon's detailed face must agree with the face its parent
  // planet already shows: size and shade are inherited from the
  // parent's stable moon entry, then the fingerprint is computed
  // from the final params (derivation from shared stable params).
  function inheritMoonFace(params, mm){
    params.radius = 0.4 + mm.size * 3.5;
    const g = [mm.shade, mm.shade, mm.shade * 1.04];
    const mixTo = (c, t) => c.map((v, k) => v * (1 - t) + g[k] * t);
    params.base = mixTo(params.base, 0.6);
    params.alt  = mixTo(params.alt, 0.6);
    params.band = mixTo(params.band, 0.45);
    params.hasAtmo = false;
  }

  // resolve: address -> stable descriptor (no DOM, no THREE)
  function resolveFresh(addr){
    const h = chainHash(addr);
    const kind = deepestKind(addr);
    const rng = mulberry32(h);
    let params, fingerprint, bodyType;
    if(kind === "P" || kind === "M"){
      bodyType = "planet";
      params = genPlanet(rng, kind === "M");
      if(kind === "M"){
        const par = parentAddress(addr);
        if(par && deepestKind(par) === "P"){
          const idx = addr.segs[addr.segs.length - 1].i;
          const mm = resolve(par).params.moons[idx];
          if(mm) inheritMoonFace(params, mm);
        }
      }
      fingerprint = fingerprintPlanet(params);
    }else{
      bodyType = "proxy";
      params = genProxy(rng, kind);
      fingerprint = fingerprintProxy(kind, params);
    }
    return { kind, kindLabel: KIND_LABEL[kind], bodyType, params, fingerprint, chain: h };
  }

  const _cache = new Map();
  function resolve(addr){
    const key = serializeAddress(addr);
    if(_cache.has(key)) return _cache.get(key);
    const d = resolveFresh(addr);
    _cache.set(key, d);
    return d;
  }
  function clearCache(){ _cache.clear(); _webMemo.clear(); }

  // deterministic initial focus point for a seed: an ordinary planet
  // on a real node of the web, every index within canonical range
  function initialAddress(seed){
    const rng = mulberry32(chain(hashStr(seed), TAG.INIT));
    const ri = n => Math.floor(rng() * n);
    let cell = [ri(49)-24, ri(49)-24, ri(49)-24];
    for(let t = 0; t < 64; t++){
      if(cellFeatures(seed, cell).node.length) break;
      cell = [ri(49)-24, ri(49)-24, ri(49)-24];
    }
    const nodes = cellFeatures(seed, cell).node;
    let a = { seed, segs: [{ k:"W", cell, f:{ kind:"node", id: nodes.length ? ri(nodes.length) : 0 } }] };
    for(const ck of ["C","G","Y","P"]){
      const n = canonicalChildCount(a, ck);
      if(!n) break;
      a = { seed, segs: [...a.segs, { k: ck, i: ri(n) }] };
    }
    return a;
  }

  /* ---- neighborhood (Phase 2) ---- */
  // Candidate enumeration uses canonical child counts derived from the
  // parent's hash. `jump` intentionally remains unrestricted: any index
  // resolves (reachability of unvisited targets), but only canonical
  // indices are offered as visible candidates.
  const CHILD_KIND = { S:"W", W:"C", C:"G", G:"Y", Y:"P", P:"M", M:null };
  const SALT_COUNT = 0xC41D5;
  const SALT_FEAT  = 0xFEA70;

  function parentAddress(addr){
    if(!addr.segs.length) return null;
    return { seed: addr.seed, segs: addr.segs.slice(0, -1) };
  }

  // Number of canonical children of `parent` having kind `childKind`.
  // (childKind is passed explicitly so skip-level addresses like S/W/G
  // still enumerate siblings correctly.)
  function canonicalChildCount(parent, childKind){
    const pk = deepestKind(parent);
    if(childKind === "M" && pk === "P"){
      return resolve(parent).params.moons.length;   // matches rendered moons
    }
    const rng = mulberry32(chain(chainHash(parent), TAG[childKind], SALT_COUNT));
    switch(childKind){
      case "C": {
        const wk = pk === "W" ? parent.segs[parent.segs.length-1].f.kind : "node";
        if(wk === "node")     return 2 + Math.floor(rng()*4); // 2..5
        if(wk === "filament") return 1 + Math.floor(rng()*3); // 1..3
        if(wk === "wall")     return 1 + Math.floor(rng()*2); // 1..2
        return Math.floor(rng()*2);                           // void: 0..1
      }
      case "G": return 8 + Math.floor(rng()*13);   // 8..20 galaxies
      case "Y": return 10 + Math.floor(rng()*15);  // 10..24 systems
      case "P": return 3 + Math.floor(rng()*6);    // 3..8 planets
      case "M": return Math.floor(rng()*3);        // skip-level moons 0..2
      default: return 0;
    }
  }

  /* ---- cosmic web: Worley-style approximation (Phase 4) ----
     One seed point per grid cell, position from the cell hash.
     Classification of any point by distances F1..F4 to nearby seeds:
     small F2-F1 = wall, small F3-F1 = filament, small F4-F1 = node.
     Voronoi vertices (nodes) are computed explicitly as circumcenters
     of 4 seeds passing a local empty-sphere test; edges (filaments)
     connect vertex pairs sharing 3 parent seeds. Every feature is
     owned by the cell containing its representative point, giving it
     a stable id and therefore a stable address. */
  const SALT_SEEDPT = 0x5EED0;
  const SALT_DUST   = 0xD0570;

  function seedPointOf(seedStr, cx, cy, cz){
    const rng = mulberry32(chain(hashStr(seedStr), SALT_SEEDPT, cx, cy, cz));
    return [cx + rng(), cy + rng(), cz + rng()];
  }
  function seedsAround(seedStr, cx, cy, cz, r){
    const out = [];
    for(let dx = -r; dx <= r; dx++)
      for(let dy = -r; dy <= r; dy++)
        for(let dz = -r; dz <= r; dz++){
          const c = [cx+dx, cy+dy, cz+dz];
          out.push({ cell: c, pos: seedPointOf(seedStr, c[0], c[1], c[2]) });
        }
    return out;
  }
  const d2 = (a, b) => {
    const x = a[0]-b[0], y = a[1]-b[1], z = a[2]-b[2];
    return x*x + y*y + z*z;
  };

  // sorted seed distances at a point; basis of classification & density
  function fDistances(seedStr, p){
    const c = [Math.floor(p[0]), Math.floor(p[1]), Math.floor(p[2])];
    const seeds = seedsAround(seedStr, c[0], c[1], c[2], 1);
    for(const s of seeds) s.d = Math.sqrt(d2(s.pos, p));
    seeds.sort((a, b) => a.d - b.d);
    return seeds;
  }
  // density from proximity to wall / filament / node structures;
  // tuned dark: deep voids stay nearly empty, matter clings tightly
  function webDensity(seedStr, p){
    const s = fDistances(seedStr, p);
    const w = s[1].d - s[0].d, f = s[2].d - s[0].d, n = s[3].d - s[0].d;
    return 0.06 * Math.exp(-(w*w)/0.014)
         + 0.30 * Math.exp(-(f*f)/0.006)
         + 1.00 * Math.exp(-(n*n)/0.0035)
         + 0.004;
  }

  function circumcenter4(p0, p1, p2, p3){
    const m = [], b = [];
    for(const p of [p1, p2, p3]){
      m.push([p[0]-p0[0], p[1]-p0[1], p[2]-p0[2]]);
      b.push(0.5 * (d2(p, [0,0,0]) - d2(p0, [0,0,0])));
    }
    const det = m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
              - m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
              + m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
    if(Math.abs(det) < 1e-9) return null;
    const cx = (b[0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
              - m[0][1]*(b[1]*m[2][2]-m[1][2]*b[2])
              + m[0][2]*(b[1]*m[2][1]-m[1][1]*b[2])) / det;
    const cy = (m[0][0]*(b[1]*m[2][2]-m[1][2]*b[2])
              - b[0]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
              + m[0][2]*(m[1][0]*b[2]-b[1]*m[2][0])) / det;
    const cz = (m[0][0]*(m[1][1]*b[2]-b[1]*m[2][1])
              - m[0][1]*(m[1][0]*b[2]-b[1]*m[2][0])
              + b[0]*(m[1][0]*m[2][1]-m[1][1]*m[2][0])) / det;
    return [cx, cy, cz];
  }

  const qk = v => Math.round(v * 4096);
  const posKey = p => qk(p[0]) + "," + qk(p[1]) + "," + qk(p[2]);
  const cellKey = c => c[0] + "," + c[1] + "," + c[2];
  const inCell = (p, c) => Math.floor(p[0]) === c[0] && Math.floor(p[1]) === c[1] && Math.floor(p[2]) === c[2];

  // enumeration memo: pure derivation, safe to cache; cleared with
  // the resolve cache so verification stays cache-independent
  const _webMemo = new Map();
  function memo(key, fn){
    if(_webMemo.has(key)) return _webMemo.get(key);
    const v = fn();
    if(_webMemo.size > 4000) _webMemo.clear();
    _webMemo.set(key, v);
    return v;
  }

  // Voronoi vertices owned by a cell: circumcenters of (own seed +
  // 3 of its 10 nearest neighbours) with a locally empty circumsphere
  function cellNodes(seedStr, cell){
    return memo("n|" + seedStr + "|" + cellKey(cell), () => {
      const all = seedsAround(seedStr, cell[0], cell[1], cell[2], 1);
      const ownKey = cellKey(cell);
      const own = all.find(s => cellKey(s.cell) === ownKey);
      const others = all.filter(s => s !== own)
        .sort((a, b) => d2(a.pos, own.pos) - d2(b.pos, own.pos))
        .slice(0, 10);
      const nodes = [], seen = new Set();
      for(let i = 0; i < others.length; i++)
        for(let j = i+1; j < others.length; j++)
          for(let k = j+1; k < others.length; k++){
            const quad = [own, others[i], others[j], others[k]];
            const cc = circumcenter4(own.pos, others[i].pos, others[j].pos, others[k].pos);
            if(!cc || !inCell(cc, cell)) continue;
            const r2 = d2(cc, own.pos);
            let empty = true;
            for(const s of all){
              if(quad.includes(s)) continue;
              if(d2(cc, s.pos) < r2 - 1e-9){ empty = false; break; }
            }
            if(!empty) continue;
            const key = posKey(cc);
            if(seen.has(key)) continue;
            seen.add(key);
            nodes.push({ pos: cc,
              parents: quad.map(s => cellKey(s.cell)).sort() });
          }
      nodes.sort((a, b) => qk(a.pos[0]) - qk(b.pos[0]) || qk(a.pos[1]) - qk(b.pos[1]) || qk(a.pos[2]) - qk(b.pos[2]));
      return nodes;
    });
  }

  // all features owned by a cell, with stable ids per kind
  function cellFeatures(seedStr, cell){
    return memo("f|" + seedStr + "|" + cellKey(cell), () => {
      const nodes = cellNodes(seedStr, cell);
      // filaments: pairs of nearby Voronoi vertices sharing 3 parents,
      // owned by the cell containing the edge midpoint
      const nearNodes = [];
      for(let dx = -1; dx <= 1; dx++)
        for(let dy = -1; dy <= 1; dy++)
          for(let dz = -1; dz <= 1; dz++)
            nearNodes.push(...cellNodes(seedStr, [cell[0]+dx, cell[1]+dy, cell[2]+dz]));
      const filaments = [], fseen = new Set();
      for(let i = 0; i < nearNodes.length; i++)
        for(let j = i+1; j < nearNodes.length; j++){
          const a = nearNodes[i], b = nearNodes[j];
          let shared = 0;
          for(const pk of a.parents) if(b.parents.includes(pk)) shared++;
          if(shared !== 3) continue;
          const mid = [(a.pos[0]+b.pos[0])/2, (a.pos[1]+b.pos[1])/2, (a.pos[2]+b.pos[2])/2];
          if(!inCell(mid, cell)) continue;
          const key = posKey(mid);
          if(fseen.has(key)) continue;
          fseen.add(key);
          filaments.push({ pos: mid, a: a.pos, b: b.pos });
        }
      filaments.sort((a, b) => qk(a.pos[0]) - qk(b.pos[0]) || qk(a.pos[1]) - qk(b.pos[1]) || qk(a.pos[2]) - qk(b.pos[2]));
      // walls: seed pairs whose midpoint lies in this cell and whose
      // two nearest seeds are exactly that pair
      const all = seedsAround(seedStr, cell[0], cell[1], cell[2], 1);
      const walls = [];
      for(let i = 0; i < all.length; i++)
        for(let j = i+1; j < all.length; j++){
          const mid = [(all[i].pos[0]+all[j].pos[0])/2, (all[i].pos[1]+all[j].pos[1])/2, (all[i].pos[2]+all[j].pos[2])/2];
          if(!inCell(mid, cell)) continue;
          const s = fDistances(seedStr, mid);
          const near2 = [cellKey(s[0].cell), cellKey(s[1].cell)].sort().join("|");
          const pair2 = [cellKey(all[i].cell), cellKey(all[j].cell)].sort().join("|");
          if(near2 !== pair2) continue;
          walls.push({ pos: mid });
        }
      walls.sort((a, b) => qk(a.pos[0]) - qk(b.pos[0]) || qk(a.pos[1]) - qk(b.pos[1]) || qk(a.pos[2]) - qk(b.pos[2]));
      // void: the cell's own seed point, the local density minimum region
      const own = all.find(s => cellKey(s.cell) === cellKey(cell));
      return { node: nodes, filament: filaments, wall: walls, void: [{ pos: own.pos.slice() }] };
    });
  }

  // detail of one addressed feature (position, filament endpoints);
  // exists=false for indices outside the current enumeration, which
  // still resolve as identities but have no geometric placement
  function webFeature(seedStr, wseg){
    const feats = cellFeatures(seedStr, wseg.cell);
    const list = feats[wseg.f.kind] || [];
    const item = list[wseg.f.id];
    if(!item) return { exists: false };
    return { exists: true, kind: wseg.f.kind, pos: item.pos.slice(),
             a: item.a ? item.a.slice() : null, b: item.b ? item.b.slice() : null };
  }

  // deterministic dust field: rejection-sampled from the density.
  // The seed grid for the whole sampled box is built once up front,
  // so hundreds of thousands of attempts stay cheap; this dust IS
  // the visible structure of the web. Optional spherical feathering
  // (featherR = [r0, r1] in cell units from the cell center) melts
  // the data boundary into darkness: the edge of what is drawn reads
  // as the limit of sight, never as the edge of the universe.
  function sampleWebDust(seedStr, cell, r, attempts, featherR, minR){
    const rng = mulberry32(chain(hashStr(seedStr), SALT_DUST, cell[0], cell[1], cell[2]));
    const span = 2*r + 1;
    const cx = cell[0] + 0.5, cy = cell[1] + 0.5, cz = cell[2] + 0.5;
    // precompute seeds for the box plus a 1-cell margin
    const R = r + 1, side = 2*R + 1;
    const grid = new Array(side*side*side);
    for(let dx = -R; dx <= R; dx++)
      for(let dy = -R; dy <= R; dy++)
        for(let dz = -R; dz <= R; dz++){
          grid[(dx+R) + (dy+R)*side + (dz+R)*side*side] =
            seedPointOf(seedStr, cell[0]+dx, cell[1]+dy, cell[2]+dz);
        }
    const pts = [], w = [];
    for(let t = 0; t < attempts; t++){
      const p = [cell[0] - r + rng()*span, cell[1] - r + rng()*span, cell[2] - r + rng()*span];
      let fw = 1;
      if(featherR || minR){
        const rx = p[0]-cx, ry = p[1]-cy, rz = p[2]-cz;
        const dist = Math.sqrt(rx*rx + ry*ry + rz*rz);
        if(minR && dist < minR) continue;   // annulus sampling
        if(featherR){
          fw = Math.max(0, Math.min(1, 1 - (dist - featherR[0]) / (featherR[1] - featherR[0])));
          if(fw <= 0) continue;
        }
      }
      const gx = Math.floor(p[0]) - cell[0], gy = Math.floor(p[1]) - cell[1], gz = Math.floor(p[2]) - cell[2];
      // four smallest squared distances among the 27 surrounding seeds
      let f1 = 1e9, f2 = 1e9, f3 = 1e9, f4 = 1e9;
      for(let dx = -1; dx <= 1; dx++)
        for(let dy = -1; dy <= 1; dy++)
          for(let dz = -1; dz <= 1; dz++){
            const s = grid[(gx+dx+R) + (gy+dy+R)*side + (gz+dz+R)*side*side];
            const ex = s[0]-p[0], ey = s[1]-p[1], ez = s[2]-p[2];
            const dd = ex*ex + ey*ey + ez*ez;
            if(dd < f1){ f4 = f3; f3 = f2; f2 = f1; f1 = dd; }
            else if(dd < f2){ f4 = f3; f3 = f2; f2 = dd; }
            else if(dd < f3){ f4 = f3; f3 = dd; }
            else if(dd < f4){ f4 = dd; }
          }
      const s1 = Math.sqrt(f1);
      const wv = Math.sqrt(f2) - s1, fv = Math.sqrt(f3) - s1, nv = Math.sqrt(f4) - s1;
      const dens = 0.06 * Math.exp(-(wv*wv)/0.014)
                 + 0.30 * Math.exp(-(fv*fv)/0.006)
                 + 1.00 * Math.exp(-(nv*nv)/0.0035)
                 + 0.004;
      if(rng() < dens * fw){
        pts.push(p[0], p[1], p[2]);
        w.push(Math.min(1, dens) * (0.35 + 0.65 * fw));
      }
    }
    return { pts, w };
  }

  // features in a cell and its 26 neighbours, as address objects
  // (order: cells lexicographic, then kind, then id — deterministic)
  function webFeaturesAround(seed, cell){
    const out = [];
    for(let dx = -1; dx <= 1; dx++)
      for(let dy = -1; dy <= 1; dy++)
        for(let dz = -1; dz <= 1; dz++){
          const c = [cell[0]+dx, cell[1]+dy, cell[2]+dz];
          const feats = cellFeatures(seed, c);
          for(const kind of WEB_KINDS){
            for(let id = 0; id < feats[kind].length; id++){
              out.push({ seed, segs: [{ k:"W", cell: c, f: { kind, id } }] });
            }
          }
        }
    return out;
  }

  function neighborhood(addr){
    const kind = deepestKind(addr);
    const self = serializeAddress(addr);
    const parent = parentAddress(addr);
    const siblings = [], children = [];

    if(kind === "S"){
      // root: offer the web features of the origin cell as children
      for(const a of webFeaturesAround(addr.seed, [0,0,0])) children.push(a);
    }else if(kind === "W"){
      const cell = addr.segs[addr.segs.length-1].cell;
      for(const a of webFeaturesAround(addr.seed, cell)){
        if(serializeAddress(a) !== self) siblings.push(a);
      }
      const n = canonicalChildCount(addr, "C");
      for(let i = 0; i < n; i++) children.push({ seed: addr.seed, segs: [...addr.segs, { k:"C", i }] });
    }else{
      const prefix = addr.segs.slice(0, -1);
      const n = canonicalChildCount(parent, kind);
      for(let i = 0; i < n; i++){
        const a = { seed: addr.seed, segs: [...prefix, { k: kind, i }] };
        if(serializeAddress(a) !== self) siblings.push(a);
      }
      const ck = CHILD_KIND[kind];
      if(ck){
        const m = canonicalChildCount(addr, ck);
        for(let i = 0; i < m; i++) children.push({ seed: addr.seed, segs: [...addr.segs, { k: ck, i }] });
      }
    }
    return { parent, siblings, children };
  }

  /* ---- zoom path (Phase 3) ---- */
  // Display-stage anchors: 0 planet · 1 system · 2 galaxy · 3 cluster · 4 web.
  // Real ancestors come from the focus address; below the focus a
  // deterministic representative descent (child index = parent hash
  // mod canonical count) fills the remaining stages, so zooming in is
  // always meaningful and always lands on the same objects.
  const STAGE_OF_KIND = { P:0, M:0, Y:1, G:2, C:3, W:4, S:4 };
  const DESCEND_KIND  = { W:"C", C:"G", G:"Y", Y:"P" };
  function zoomPath(focusAddr){
    const anchors = new Array(5).fill(null);
    let cum = { seed: focusAddr.seed, segs: [] };
    for(const seg of focusAddr.segs){
      cum = { seed: cum.seed, segs: [...cum.segs, seg] };
      anchors[STAGE_OF_KIND[seg.k]] = cum;
    }
    let cur = focusAddr;
    while(true){
      const k = deepestKind(cur);
      if(STAGE_OF_KIND[k] === 0) break;
      let next = null;
      if(k === "S"){
        const feats = neighborhood(cur).children;
        if(!feats.length) break;
        next = feats[chainHash(cur) % feats.length];
      }else{
        const ck = DESCEND_KIND[k];
        const n = canonicalChildCount(cur, ck);
        if(!n) break;   // e.g. an empty void: zoom stops at this stage
        next = { seed: cur.seed, segs: [...cur.segs, { k: ck, i: chainHash(cur) % n }] };
      }
      const ns = STAGE_OF_KIND[deepestKind(next)];
      if(!anchors[ns]) anchors[ns] = next;
      cur = next;
    }
    return anchors;
  }

  return { mix32, combine, chain, hashStr, mulberry32, hex8,
           WEB_KINDS, KIND_LABEL, STAGE_OF_KIND,
           serializeAddress, parseAddress, chainHash, deepestKind,
           resolve, resolveFresh, clearCache, initialAddress,
           parentAddress, canonicalChildCount, neighborhood, zoomPath,
           seedPointOf, fDistances, webDensity, cellFeatures,
           webFeature, sampleWebDust };
})();
/* CORE-END */

/* ==================== state ==================== */
const DEFAULT_SEED = "7f3e2d";
const state = {
  addr: null,        // focus target (deepest truth of the path)
  addrStr: "",       // canonical serialized focus address
  anchors: null,     // per-stage anchor addresses (0..4)
  data: null,        // per-stage display data
  viewStage: -1,     // stage currently in view (follows zoom Z)
  viewAddrStr: "",   // address shown in the HUD
  viewDesc: null,    // its resolved descriptor
  prevAddrStr: null, // one-step back
  bookmarks: []      // { a, fp, code, kind, colorCss }
};

/* ==================== render ==================== */
const R = (function(){
  const root = document.getElementById("scene");
  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.85;
  root.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x02040a);
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 200000);

  const sun = new THREE.DirectionalLight(0xfff4e0, 0.95);
  sun.position.set(3.5, 1.6, 2.4);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x334466, 0.28);
  fill.position.set(-3, -1, -2);
  scene.add(fill);
  scene.add(new THREE.AmbientLight(0x8899bb, 0.3));

  // --- the sky from within (Phase 5 / view-from-inside) ---
  // Standing on a planet, the sky is not decoration: it is the home
  // galaxy seen from inside — thousands of stars concentrated toward
  // the galactic plane, a soft milky band, and a few neighbouring
  // galaxies as barely-there smudges. Synthesized deterministically
  // from the galaxy and system chains, not physically projected, so
  // the same planet always shows the same sky.
  let sky = null;
  function buildSky(sd){
    if(sky){ scene.remove(sky.group); disposeGroup(sky.group); }
    sky = { group: new THREE.Group(), mats: [] };
    const rng = SE.mulberry32(SE.chain(sd.chain, 0x5C1E));
    const gauss = () => (rng()+rng()+rng()+rng()-2)/2;
    const R = 150;
    // the milky band lies along the home galaxy's actual disc plane —
    // the very plane you will see from outside after zooming away
    const n = sd.hasGalaxy ? orientationOf(sd.galaxyChain)
      : new THREE.Vector3(Math.sin(Math.acos(2*rng()-1))*Math.cos(rng()*Math.PI*2), 0.5, 0.5).normalize();
    const u = new THREE.Vector3(0,1,0).cross(n);
    if(u.lengthSq() < 1e-4) u.set(1,0,0); else u.normalize();
    const v = new THREE.Vector3().crossVectors(n, u);
    const tint = sd.tint.map(c => c + (1-c)*0.6);
    const PR = renderer.getPixelRatio(); // screen-pixel sizes must scale with DPR

    // two layers: a dense field of faint unresolved stars carries the
    // fullness of a night sky; a few hundred resolved bright stars
    // carry its sharpness
    const dirOf = bandBias => {
      if(sd.hasGalaxy && rng() < bandBias){
        const a = rng()*Math.PI*2;
        const lat = gauss() * 0.13;
        return new THREE.Vector3()
          .addScaledVector(u, Math.cos(lat)*Math.cos(a))
          .addScaledVector(v, Math.cos(lat)*Math.sin(a))
          .addScaledVector(n, Math.sin(lat));
      }
      const t = rng()*Math.PI*2, p = Math.acos(2*rng()-1);
      return new THREE.Vector3(Math.sin(p)*Math.cos(t), Math.cos(p), Math.sin(p)*Math.sin(t));
    };
    const starLayer = (N, bandBias, bright, size, opacity) => {
      const pos = new Float32Array(N*3), col = new Float32Array(N*3);
      for(let i = 0; i < N; i++){
        const dir = dirOf(bandBias);
        pos[i*3] = dir.x*R; pos[i*3+1] = dir.y*R; pos[i*3+2] = dir.z*R;
        const b = bright(rng);
        const t = rng();
        col[i*3]   = b * (0.86 + t*0.14);
        col[i*3+1] = b * (0.88 + t*0.08);

      g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      g.setAttribute("color", new THREE.BufferAttribute(col, 3));

          .addScaledVector(v, Math.sin(a))

      const t = r2()*Math.PI*2, p = Math.acos(2*r2()-1);

      sp.scale.set(6 + r2()*9, (6 + r2()*9) * asp, 1);

      sky.group.add(sp);

    sky.group.traverse(o => {
      if(o.material){ o.material.transparent = true;

    });

  // the inside view dissolves as you leave the galaxy

  }

  /* --- procedural textures (visuals only; identity lives in params) --- */
  function makeNoise(rng, size){
    const g = new Float32Array(size*size);
    for(let i = 0; i < g.length; i++) g[i] = rng();
    const at = (x,y) => g[((y%size+size)%size)*size + ((x%size+size)%size)];
    function sample(u, v){
      const x = u*size, y = v*size;
      const x0 = Math.floor(x), y0 = Math.floor(y);
      const fx = x-x0, fy = y-y0;
      const sx = fx*fx*(3-2*fx), sy = fy*fy*(3-2*fy);
      const a = at(x0,y0), b = at(x0+1,y0), c = at(x0,y0+1), d = at(x0+1,y0+1);
      return a + (b-a)*sx + (c-a)*sy + (a-b-c+d)*sx*sy;
    }
    return function fbm(u, v, oct){
      let s = 0, amp = 0.5, f = 1;
      for(let o = 0; o < oct; o++){ s += amp*sample(u*f, v*f); amp *= 0.5; f *= 2; }
      return s;
    };

    const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const ctx = cv.getContext("2d");
    const img = ctx.createImageData(W, H);
    const rng = SE.mulberry32(texSeed);
    const fbm = makeNoise(rng, 64);
    const fbm2 = makeNoise(rng, 64);
    for(let y = 0; y < H; y++){
      const v = y/H, lat = Math.abs(v - 0.5)*2;

  // grayscale height map re-deriving the same first-noise field the

    const ctx = cv.getContext("2d");

  const fresnelMat = (color, intensity) => new THREE.ShaderMaterial({

  /* --- scale stages (Phase 3) --- */
  // Continuous log zoom Z over 5 display stages:
  //   0 planet · 1 system · 2 galaxy · 3 cluster · 4 web
  // Each stage lives in its own unit-sized local frame with the
  // focus-path child anchored at the world origin. Every frame each
  // stage group is scaled by K^(j - Z) and faded by its distance to

  // frames, never a scene swap. The camera never moves in depth.
  // Per-stage size ratios (stage j -> j+1). Compressed from reality
  // (planet:system ~1e3-1e4, system:galaxy ~1e7, galaxy:cluster
  // ~1e1-1e2, cluster:web ~1e2-1e3) but keeping its direction:

  // different ratio, so the gesture stays even-paced.
  const KJ = [400, 1500, 18, 45];

  const LSUM = [0, LK[0], LK[0]+LK[1], LK[0]+LK[1]+LK[2], LK[0]+LK[1]+LK[2]+LK[3]];

    const ctx = cv.getContext("2d");
    const g = ctx.createRadialGradient(16,16,0,16,16,16);
    g.addColorStop(0, "rgba(255,255,255,1)");
    g.addColorStop(0.4, "rgba(255,255,255,0.55)");
    g.addColorStop(1, "rgba(255,255,255,0)");

  const markerMatCache = new Map();

    const ctx = cv.getContext("2d");

    let g = ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0, withA(colorCss, 0.14));
    g.addColorStop(0.35, withA(colorCss, 0.05));
    g.addColorStop(1, withA(colorCss, 0));

  // Any visual trait shown at two scales must come from ONE derivation.
  // A galaxy's 3D orientation drives its exterior plane, its interior
  // disc, and the milky band seen from a planet inside it. A system's
  // star color drives both its point in the galaxy and its sun.
  function orientationOf(chainH){

    g.addColorStop(0.16, withA(tintCss, 0.24));

        blending: THREE.AdditiveBlending }));

    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), orientationOf(chainH));
    return mesh;
  }

  const WEB_COLOR = { node:"rgb(255,241,219)", filament:"rgb(216,229,247)",

  const WEB_SIZE  = { node:0.075, filament:0.05, wall:0.04, void:0.034 };
  const WEB_ALPHA = { node:0.95, filament:0.55, wall:0.32, void:0.2 };

  function disposeGroup(g){
    g.traverse(o => {

        ms.forEach(m => { if(m.map) m.map.dispose(); m.dispose(); });
      }

  /* --- stage builders (data arrives pre-resolved from the ui layer) --- */
  function buildPlanetStage(d){
    const st = newStage();

    axis.rotation.z = p.tilt;

        new THREE.SphereGeometry(m.size, 20, 14),
        new THREE.MeshStandardMaterial({ color: new THREE.Color(m.shade, m.shade, m.shade*1.04), roughness: 1 }));
      mesh.position.x = p.radius * m.dist;
